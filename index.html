<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Смета ремонта | Кувандык</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: system-ui, -apple-system, sans-serif; background: #f5f5f5; padding: 16px; }
        .card { background: white; border-radius: 20px; padding: 20px; max-width: 500px; margin: 0 auto; }
        button.send-btn { background: #e67e22; color: white; border: none; padding: 16px; border-radius: 40px; font-size: 18px; font-weight: bold; width: 100%; margin-top: 16px; cursor: pointer; }
        .option-group { display: flex; flex-wrap: wrap; gap: 10px; margin: 12px 0; }
        .option-btn { background: #f0f0f0; border: none; padding: 10px 16px; border-radius: 30px; cursor: pointer; }
        .option-btn.active { background: #e67e22; color: white; }
        .section-title { font-weight: bold; margin-top: 16px; margin-bottom: 8px; border-left: 3px solid #e67e22; padding-left: 10px; }
        .price-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid #eee; }
        .total-row { font-weight: bold; font-size: 18px; border-top: 2px solid #e67e22; padding-top: 12px; margin-top: 12px; }
        .debug-panel {
            background: #1e1e1e;
            color: #0f0;
            font-family: monospace;
            font-size: 11px;
            padding: 10px;
            margin-top: 20px;
            border-radius: 8px;
            word-break: break-all;
            max-height: 150px;
            overflow-y: auto;
        }
        .debug-line { margin: 2px 0; border-bottom: 1px solid #333; }
    </style>
</head>
<body>
<div class="card">
    <h2>🔨 Смета ремонта</h2>
    <div class="subtitle">г. Кувандык | Илья и Руслан</div>
    
    <div class="section-title">🛁 Материал</div>
    <div class="option-group" id="material-group">
        <button class="option-btn" data-value="steel">Стальная</button>
        <button class="option-btn" data-value="cast_iron">Чугунная</button>
    </div>
    
    <div class="section-title">📏 Длина</div>
    <div class="option-group" id="length-group">
        <button class="option-btn" data-value="150">1.5 м</button>
        <button class="option-btn" data-value="170">1.7 м (+15%)</button>
    </div>
    
    <div class="section-title">🎨 Покрытие</div>
    <div class="option-group" id="coating-group">
        <button class="option-btn" data-value="acryl">Акрил</button>
        <button class="option-btn" data-value="marble">Мрамор</button>
    </div>
    
    <div class="section-title">🔄 Сифон</div>
    <div class="option-group" id="siphon-group">
        <button class="option-btn" data-value="no">Не нужно</button>
        <button class="option-btn" data-value="yes">Да (+500₽)</button>
    </div>
    
    <div class="section-title">🎁 Скидка</div>
    <div class="option-group" id="discount-group">
        <button class="option-btn" data-value="none">Нет</button>
        <button class="option-btn" data-value="pensioner">Пенсионер -10%</button>
        <button class="option-btn" data-value="repeat">Повторный -5%</button>
        <button class="option-btn" data-value="both">Обе -15%</button>
    </div>
    
    <div class="price-row"><span>💰 Базовая стоимость:</span><span id="base-price">0₽</span></div>
    <div class="price-row" id="extra-row" style="display:none;"><span>📏 Наценка 1.7м:</span><span id="extra-price">0₽</span></div>
    <div class="price-row" id="siphon-row" style="display:none;"><span>🔄 Сифон:</span><span id="siphon-price">0₽</span></div>
    <div class="price-row" id="discount-row" style="display:none;"><span>🎁 Скидка:</span><span id="discount-price">0₽</span></div>
    <div class="total-row"><span>💰 ИТОГО:</span><span id="total-price">0₽</span></div>
    
    <button class="send-btn" id="send-btn">📞 Отправить заявку</button>
    
    <div id="debug-panel" class="debug-panel">
        <div class="debug-line">⏳ Ожидание действий...</div>
    </div>
</div>

<script>
    function addDebug(msg) {
        const panel = document.getElementById('debug-panel');
        const line = document.createElement('div');
        line.className = 'debug-line';
        line.textContent = new Date().toLocaleTimeString() + ' | ' + msg;
        panel.appendChild(line);
        panel.scrollTop = panel.scrollHeight;
        console.log(msg);
    }
    
    addDebug('🔄 Инициализация...');
    
    const PRICES = {
        steel_acryl_150: 7500, steel_marble_150: 8500,
        cast_iron_acryl_150: 8000, cast_iron_marble_150: 9000
    };
    
    let state = { material: 'steel', length: '150', coating: 'acryl', siphon: 'no', discount: 'none' };
    let tg = null;
    
    // Проверяем Telegram WebApp
    setTimeout(() => {
        tg = window.Telegram?.WebApp;
        if (tg) {
            tg.expand();
            tg.ready();
            addDebug('✅ Telegram WebApp: ПОДКЛЮЧЕН');
        } else {
            addDebug('⚠️ Telegram WebApp: НЕ НАЙДЕН (работаем в браузере)');
        }
    }, 200);
    
    function calculate() {
        let basePrice = 0;
        if (state.material === 'steel') {
            basePrice = state.coating === 'acryl' ? PRICES.steel_acryl_150 : PRICES.steel_marble_150;
        } else {
            basePrice = state.coating === 'acryl' ? PRICES.cast_iron_acryl_150 : PRICES.cast_iron_marble_150;
        }
        
        let extraCharge = state.length === '170' ? basePrice * 0.15 : 0;
        let priceAfterLength = basePrice + extraCharge;
        let siphonPrice = state.siphon === 'yes' ? 500 : 0;
        
        let discountPercent = 0;
        if (state.discount === 'pensioner') discountPercent = 10;
        else if (state.discount === 'repeat') discountPercent = 5;
        else if (state.discount === 'both') discountPercent = 15;
        
        let discountAmount = priceAfterLength * discountPercent / 100;
        let total = priceAfterLength - discountAmount + siphonPrice;
        
        document.getElementById('base-price').innerHTML = basePrice.toLocaleString() + '₽';
        document.getElementById('extra-row').style.display = extraCharge > 0 ? 'flex' : 'none';
        document.getElementById('extra-price').innerHTML = extraCharge.toLocaleString() + '₽';
        document.getElementById('siphon-row').style.display = siphonPrice > 0 ? 'flex' : 'none';
        document.getElementById('siphon-price').innerHTML = siphonPrice.toLocaleString() + '₽';
        document.getElementById('discount-row').style.display = discountAmount > 0 ? 'flex' : 'none';
        document.getElementById('discount-price').innerHTML = '-' + discountAmount.toLocaleString() + '₽';
        document.getElementById('total-price').innerHTML = total.toLocaleString() + '₽';
    }
    
    function setupGroup(groupId, paramName) {
        document.querySelectorAll(`#${groupId} .option-btn`).forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll(`#${groupId} .option-btn`).forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                state[paramName] = btn.dataset.value;
                calculate();
            });
            if (btn.dataset.value === state[paramName]) btn.classList.add('active');
        });
    }
    
    setupGroup('material-group', 'material');
    setupGroup('length-group', 'length');
    setupGroup('coating-group', 'coating');
    setupGroup('siphon-group', 'siphon');
    setupGroup('discount-group', 'discount');
    
    // Принудительная инициализация активных кнопок
    setTimeout(() => {
        document.querySelectorAll('.option-group').forEach(group => {
            const activeBtn = group.querySelector('.option-btn.active');
            if (!activeBtn && group.querySelector('.option-btn')) {
                group.querySelector('.option-btn').click();
            }
        });
        calculate();
    }, 50);
    
    document.getElementById('send-btn').onclick = () => {
        addDebug('🔘 Нажата кнопка отправки');
        
        const data = {
            type: 'estimate',
            material: state.material,
            length: state.length,
            coating: state.coating,
            siphon: state.siphon,
            discount: state.discount,
            total: document.getElementById('total-price').innerText
        };
        const jsonData = JSON.stringify(data);
        
        addDebug('📦 Данные: ' + jsonData);
        
        if (tg) {
            addDebug('📤 Отправка через tg.sendData()...');
            try {
                tg.sendData(jsonData);
                addDebug('✅ Данные отправлены!');
                setTimeout(() => tg.close(), 500);
            } catch(e) {
                addDebug('❌ Ошибка: ' + e.message);
            }
        } else {
            addDebug('📋 Копирование в буфер (нет WebApp)');
            navigator.clipboard.writeText(jsonData);
            alert('✅ Данные скопированы!\n\n' + jsonData);
        }
    };
    
    addDebug('✅ Готово! Выберите параметры и нажмите кнопку.');
</script>
</body>
</html>
