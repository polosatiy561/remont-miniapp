<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест WebApp</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; text-align: center; }
        button { background: #e67e22; color: white; border: none; padding: 15px 30px; font-size: 18px; border-radius: 30px; margin-top: 20px; }
        .status { margin-top: 20px; padding: 10px; background: #f0f0f0; border-radius: 10px; }
        .green { background: #d4edda; color: #155724; }
        .red { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <h2>🔨 Тест WebApp</h2>
    <p>Нажмите кнопку для отправки тестовых данных</p>
    <button id="test-btn">📤 Отправить тест</button>
    <div id="status" class="status">⏳ Проверка...</div>

    <script>
        const statusDiv = document.getElementById('status');
        let tg = null;
        
        // Проверяем Telegram
        setTimeout(() => {
            tg = window.Telegram?.WebApp;
            if (tg) {
                tg.expand();
                tg.ready();
                statusDiv.innerHTML = '✅ Telegram WebApp: ПОДКЛЮЧЕН!';
                statusDiv.className = 'status green';
            } else {
                statusDiv.innerHTML = '⚠️ Telegram WebApp: НЕ НАЙДЕН';
                statusDiv.className = 'status red';
            }
        }, 200);
        
        document.getElementById('test-btn').onclick = () => {
            const testData = JSON.stringify({
                type: 'test',
                message: 'Это тестовое сообщение из WebApp',
                time: new Date().toLocaleString()
            });
            
            statusDiv.innerHTML = '📤 Отправка данных...';
            
            if (tg) {
                try {
                    tg.sendData(testData);
                    statusDiv.innerHTML = '✅ Данные отправлены! Приложение закроется.';
                    setTimeout(() => tg.close(), 500);
                } catch(e) {
                    statusDiv.innerHTML = '❌ Ошибка: ' + e.message;
                    statusDiv.className = 'status red';
                }
            } else {
                navigator.clipboard.writeText(testData);
                statusDiv.innerHTML = '📋 Данные скопированы в буфер (нет WebApp)';
                alert('Данные скопированы:\n' + testData);
            }
        };
    </script>
</body>
</html>
